  <script type="text/plain" id="app-script">
// Main application: navigation, home, song screen, edit mode, print, lists, exports.

const { useState, useEffect, useRef } = window.React;
const {
  RetroBtn, TopBtn, Page, NoteFigure, ChordBars, CellEditor, StructureLine,
  StructureEditor, SectionNamePicker, LyricParagraphEditor, Metronome,
} = window;
const {
  letterFor, transposeChord, SAMPLE_SONG, uid, clone, newSong, detectKey,
  TIME_OPTIONS, KEY_CHOICES, songToOpenLyrics, openLyricsToSong, safeName, downloadBlob,
} = window;

const CONF = window.APP_CONFIG || {};
const LIB_KEY = 'chordchart.library.v1';
const MAX_LISTS = 10;

function loadLibrary() {
  let data = null;
  try {
    const raw = localStorage.getItem(LIB_KEY);
    if (raw) data = JSON.parse(raw);
  } catch (e) {}
  if (!data || !data.songs || !data.songs.length) {
    const sample = { id: uid(), meta: { ...SAMPLE_SONG.meta }, groups: clone(SAMPLE_SONG.groups),
      structure: clone(SAMPLE_SONG.structure), lyrics: clone(SAMPLE_SONG.lyrics) };
    data = { songs: [sample], currentId: sample.id };
  }
  data.songs.forEach(s => {
    if (!s.lyrics) s.lyrics = [];
    if (!s.structure) s.structure = [];
    if (!s.groups) s.groups = [];
    if (!s.meta) s.meta = {};
    if (s.meta.transpose == null) s.meta.transpose = 0;
    if (!s.meta.key) s.meta.key = detectKey(s.groups);
    if (s.meta.capo == null) s.meta.capo = '0';
  });
  if (!data.lists) data.lists = [];
  if (!data.songs.find(s => s.id === data.currentId)) data.currentId = data.songs[0].id;
  const ui = { theme: 'dark', scale: 1, titleScale: 1, lyricsView: null, ...(data.ui || {}) };
  return { songs: data.songs, lists: data.lists, currentId: data.currentId, ui };
}

const isMobile = () => window.matchMedia('(max-width: 820px)').matches;

// =================================================================
function App() {
  const [st, setSt] = useState(loadLibrary);
  const [base, setBase] = useState('home');           // 'home' | 'song'
  const [stack, setStack] = useState([]);              // page overlay stack
  const [editMode, setEditMode] = useState(false);
  const [metroOpen, setMetroOpen] = useState(false);
  const [fromListId, setFromListId] = useState(null);
  const [printJob, setPrintJob] = useState(null);      // {songs, layout, orientation}
  const fileRef = useRef(null);
  const importMode = useRef('json');

  useEffect(() => { localStorage.setItem(LIB_KEY, JSON.stringify(st)); }, [st]);
  useEffect(() => {
    document.documentElement.dataset.theme = st.ui.theme;
    document.documentElement.style.setProperty('--scale', st.ui.scale);
    document.documentElement.style.setProperty('--title-scale', st.ui.titleScale);
  }, [st.ui.theme, st.ui.scale, st.ui.titleScale]);

  const cur = st.songs.find(s => s.id === st.currentId) || st.songs[0];
  const setUi = patch => setSt(s => ({ ...s, ui: { ...s.ui, ...patch } }));
  const setSong = updater => setSt(s => ({ ...s, songs: s.songs.map(x => x.id === cur.id ? updater(x) : x) }));
  const setMeta = patch => setSong(x => ({ ...x, meta: { ...x.meta, ...patch } }));

  // ---- navigation ----
  const push = (kind, props) => setStack(s => [...s, { kind, props: props || {} }]);
  const pop = () => setStack(s => s.slice(0, -1));
  const popAll = () => setStack([]);
  const goHome = () => { popAll(); setEditMode(false); setFromListId(null); setBase('home'); };
  const openSongScreen = (id, listId) => {
    setSt(s => ({ ...s, currentId: id }));
    setEditMode(false); setFromListId(listId || null);
    popAll(); setBase('song');
  };

  // ---- print ----
  useEffect(() => {
    if (!printJob) return;
    const styleEl = document.createElement('style');
    styleEl.textContent = `@page { size: letter ${printJob.orientation === 'horizontal' ? 'landscape' : 'portrait'}; margin: 12mm; }`;
    document.head.appendChild(styleEl);
    const done = () => setPrintJob(null);
    window.addEventListener('afterprint', done, { once: true });
    const tid = setTimeout(() => window.print(), 250);
    return () => { clearTimeout(tid); document.head.removeChild(styleEl); window.removeEventListener('afterprint', done); };
  }, [printJob]);

  // ---- import / export ----
  const triggerImport = mode => { importMode.current = mode; if (fileRef.current) { fileRef.current.value = ''; fileRef.current.click(); } };
  const onFile = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        if (importMode.current === 'xml' || /\.xml$/i.test(file.name)) {
          const parsed = openLyricsToSong(reader.result);
          const song = newSong({ title: parsed.title }, parsed.lyrics);
          setSt(s => ({ ...s, songs: [...s.songs, song], currentId: song.id }));
          openSongScreen(song.id);
        } else {
          const data = JSON.parse(reader.result);
          const arr = Array.isArray(data) ? data : [data];
          const songs = arr.map(s => ({ id: uid(), meta: { transpose: 0, capo: '0', ...s.meta }, groups: s.groups || [], structure: s.structure || [], lyrics: s.lyrics || [] }));
          songs.forEach(s => { if (!s.meta.key) s.meta.key = detectKey(s.groups); });
          setSt(s => ({ ...s, songs: [...s.songs, ...songs], currentId: songs[0].id }));
          openSongScreen(songs[0].id);
        }
      } catch (err) { alert('No se pudo importar el archivo: ' + err.message); }
    };
    reader.readAsText(file);
  };
  const cleanSong = (s, withLyrics = true) => {
    const out = { meta: s.meta, groups: s.groups, structure: s.structure };
    out.lyrics = withLyrics ? (s.lyrics || []) : [];
    return out;
  };
  const exportOne = song => {
    downloadBlob(safeName(song.meta.title) + '.json',
      new Blob([JSON.stringify(cleanSong(song), null, 2)], { type: 'application/json' }));
  };
  const exportZip = async (name, files) => {
    const zip = new JSZip();
    files.forEach(f => zip.file(f.name, f.content));
    const blob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(name, blob);
  };
  const exportManySongs = songs => exportZip('canciones.zip',
    songs.map(s => ({ name: safeName(s.meta.title) + '.json', content: JSON.stringify(cleanSong(s), null, 2) })));
  const exportLyricsXml = song => {
    downloadBlob(safeName(song.meta.title) + '.xml', new Blob([songToOpenLyrics(song)], { type: 'application/xml' }));
  };
  const exportAllLyricsZip = () => exportZip('letras_openlp.zip',
    st.songs.map(s => ({ name: safeName(s.meta.title) + '.xml', content: songToOpenLyrics(s) })));
  const exportListZip = (list, withLyrics) => {
    const songs = list.songIds.map(id => st.songs.find(s => s.id === id)).filter(Boolean);
    const files = songs.map(s => ({ name: safeName(s.meta.title) + '.json', content: JSON.stringify(cleanSong(s, withLyrics), null, 2) }));
    if (withLyrics) songs.forEach(s => files.push({ name: safeName(s.meta.title) + '.xml', content: songToOpenLyrics(s) }));
    return exportZip(safeName(list.name) + '.zip', files);
  };

  // ---- songs / groups / structure / lyrics mutations ----
  const removeSong = id => setSt(s => {
    if (s.songs.length <= 1) return s;
    const songs = s.songs.filter(x => x.id !== id);
    const lists = s.lists.map(l => ({ ...l, songIds: l.songIds.filter(x => x !== id) }));
    const currentId = s.currentId === id ? songs[0].id : s.currentId;
    return { ...s, songs, lists, currentId };
  });
  const addGroup = () => setSong(x => ({ ...x, groups: [...x.groups, { id: uid(), measures: [] }] }));
  const removeGroup = gi => setSong(x => {
    const g = x.groups[gi];
    const groups = x.groups.filter((_, k) => k !== gi);
    const fallback = groups[0] ? groups[0].id : null;
    const structure = x.structure.map(p => p.groupId === g.id ? { ...p, groupId: fallback } : p);
    return { ...x, groups, structure };
  });
  const setCell = (gi, ci, cell) => setSong(x => {
    const groups = x.groups.map((g, k) => {
      if (k !== gi) return g;
      const measures = g.measures.slice();
      if (ci == null) measures.push(cell); else measures[ci] = cell;
      return { ...g, measures };
    });
    return { ...x, groups };
  });
  const removeCell = (gi, ci) => setSong(x => ({
    ...x,
    groups: x.groups.map((g, k) => k !== gi ? g : { ...g, measures: g.measures.filter((_, i) => i !== ci) }),
  }));
  const savePart = (pi, data) => setSong(x => {
    const structure = x.structure.slice();
    if (pi == null) structure.push({ id: uid(), ...data });
    else structure[pi] = { ...structure[pi], ...data };
    return { ...x, structure };
  });
  const removePart = pi => setSong(x => ({ ...x, structure: x.structure.filter((_, k) => k !== pi) }));
  const saveLyric = (li, data) => setSong(x => {
    const lyrics = (x.lyrics || []).slice();
    if (li == null) lyrics.push({ id: uid(), ...data });
    else lyrics[li] = { ...lyrics[li], ...data };
    return { ...x, lyrics };
  });
  const removeLyric = li => setSong(x => ({ ...x, lyrics: x.lyrics.filter((_, k) => k !== li) }));

  // ---- lists ----
  const nextListName = () => {
    for (let i = 1; i <= MAX_LISTS; i++) {
      const n = 'Lista ' + i;
      if (!st.lists.find(l => l.name === n)) return n;
    }
    return null;
  };
  const saveList = songIds => {
    const name = nextListName();
    if (!name) return false;
    setSt(s => ({ ...s, lists: [...s.lists, { id: uid(), name, songIds }] }));
    return true;
  };
  const removeList = id => setSt(s => ({ ...s, lists: s.lists.filter(l => l.id !== id) }));

  // =================================================================
  // PAGE RENDERING
  const top = stack[stack.length - 1];

  const songButton = (s, onClick, extra) => (
    <RetroBtn key={s.id} icon="♬" text={s.meta.title || 'Sin título'}
      sub={'Tono ' + (s.meta.key || detectKey(s.groups)) + ' · ' + s.meta.time + ' · ' + s.meta.tempo + ' bpm' + (extra || '')}
      onClick={onClick} />
  );

  function renderPage(page) {
    const P = page.props;
    switch (page.kind) {

      case 'open-song': {
        if (st.songs.length > 5) {
          const letters = [...new Set(st.songs.map(s => (s.meta.title || '#').trim().charAt(0).toUpperCase() || '#'))].sort();
          return (
            <Page title="Abrir canción" onBack={pop}>
              <div className="folder-grid">
                {letters.map(L => (
                  <button key={L} className="folder-btn" onClick={() => push('song-list', { letter: L, action: P.action })}>
                    <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" strokeWidth="1.6" aria-hidden="true">
                      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    </svg>
                    <span>{L}</span>
                  </button>
                ))}
              </div>
            </Page>
          );
        }
        return (
          <Page title={P.title || 'Abrir canción'} onBack={pop}>
            {st.songs.map(s => songButton(s, () => P.onPick(s)))}
          </Page>
        );
      }

      case 'song-list': {
        const songs = st.songs.filter(s => ((s.meta.title || '#').trim().charAt(0).toUpperCase() || '#') === P.letter);
        return (
          <Page title={'Canciones — ' + P.letter} onBack={pop}>
            {songs.map(s => songButton(s, () => P.action(s)))}
          </Page>
        );
      }

      case 'add-song':
        return <AddSongPage songs={st.songs} onBack={pop}
          onCreate={song => { setSt(s => ({ ...s, songs: [...s.songs, song], currentId: song.id })); openSongScreen(song.id); }} />;

      case 'lists':
        return (
          <Page title="Listas" onBack={pop}>
            <RetroBtn icon="⊕" text="Agregar lista" sub={st.lists.length + ' de ' + MAX_LISTS + ' guardadas'} onClick={() => push('add-list')} />
            <RetroBtn icon="▣" text="Abrir lista" sub={st.lists.length ? st.lists.map(l => l.name).join(' · ') : 'Sin listas todavía'} onClick={() => push('open-list')} />
          </Page>
        );

      case 'add-list':
        if (st.lists.length >= MAX_LISTS) {
          return (
            <Page title="Agregar lista" sub="Ya tienes 10 listas. Borra una antes de agregar otra." onBack={pop}>
              {st.lists.map(l => (
                <RetroBtn key={l.id} icon="✕" text={'Borrar ' + l.name} sub={l.songIds.length + ' canciones'} onClick={() => removeList(l.id)} />
              ))}
            </Page>
          );
        }
        return <AddListPage songs={st.songs} name={nextListName()} onBack={pop}
          onSave={ids => { saveList(ids); pop(); }} />;

      case 'open-list':
        return (
          <Page title="Abrir lista" onBack={pop}>
            {st.lists.length === 0 && <div className="dim-note">Sin listas guardadas.</div>}
            {st.lists.map(l => (
              <RetroBtn key={l.id} icon="▣" text={l.name} sub={l.songIds.length + ' canciones'} onClick={() => push('list-songs', { listId: l.id })} />
            ))}
          </Page>
        );

      case 'list-songs': {
        const list = st.lists.find(l => l.id === P.listId);
        if (!list) return <Page title="Lista" onBack={pop}><div className="dim-note">La lista ya no existe.</div></Page>;
        const songs = list.songIds.map(id => st.songs.find(s => s.id === id)).filter(Boolean);
        return (
          <Page title={list.name} onBack={pop}>
            {songs.map(s => songButton(s, () => openSongScreen(s.id, list.id)))}
            <RetroBtn icon="✕" text="Borrar esta lista" onClick={() => { removeList(list.id); pop(); }} />
          </Page>
        );
      }

      case 'import':
        return (
          <Page title="Importar canciones" onBack={pop}>
            <RetroBtn icon="⇣" text="Importar canción" sub="Archivo .json" onClick={() => { triggerImport('json'); }} />
            <RetroBtn icon="⇣" text="Importar letra con XML" sub="Formato OpenLyrics (OpenLP)" onClick={() => { triggerImport('xml'); }} />
          </Page>
        );

      case 'export-songs':
        return (
          <Page title="Exportar canciones" onBack={pop}>
            <RetroBtn icon="♬" text="Canción actual" sub={'«' + cur.meta.title + '»'} onClick={() => { exportOne(cur); pop(); }} />
            <RetroBtn icon="▣" text="Toda la base de datos" sub={st.songs.length + ' canciones en zip'} onClick={() => { exportManySongs(st.songs); pop(); }} />
            <RetroBtn icon="☑" text="Canciones seleccionadas" sub="Elige cuáles exportar" onClick={() => push('export-select')} />
            <RetroBtn icon="✎" text="Exportar todas las letras" sub="OpenLP (.xml) en zip" onClick={() => { exportAllLyricsZip(); pop(); }} />
          </Page>
        );

      case 'export-select':
        return <SelectSongsPage songs={st.songs} title="Canciones seleccionadas" actionLabel="Exportar" onBack={pop}
          onDone={ids => {
            const songs = st.songs.filter(s => ids.includes(s.id));
            if (songs.length === 1) exportOne(songs[0]); else exportManySongs(songs);
            pop();
          }} />;

      case 'export-lyrics':
        return (
          <Page title="Exportar letra" sub="Elige la canción; se exporta en formato OpenLP (.xml)." onBack={pop}>
            {st.songs.map(s => songButton(s, () => { exportLyricsXml(s); pop(); }, s.lyrics && s.lyrics.length ? ' · con letra' : ' · sin letra'))}
          </Page>
        );

      case 'export-list':
        return (
          <Page title="Exportar lista" onBack={pop}>
            {st.lists.length === 0 && <div className="dim-note">Sin listas guardadas.</div>}
            {st.lists.map(l => (
              <RetroBtn key={l.id} icon="▣" text={l.name} sub={l.songIds.length + ' canciones'} onClick={() => push('export-list-ask', { listId: l.id })} />
            ))}
          </Page>
        );

      case 'export-list-ask': {
        const list = st.lists.find(l => l.id === P.listId);
        if (!list) return <Page title="Exportar lista" onBack={pop}><div className="dim-note">La lista ya no existe.</div></Page>;
        return (
          <Page title={'Exportar ' + list.name} sub="¿Quieres exportar con sus letras?" onBack={pop}>
            <RetroBtn icon="✓" text="Con letras" sub="Canciones + letras OpenLP" primary onClick={() => { exportListZip(list, true); popAll(); }} />
            <RetroBtn icon="—" text="Sin letras" sub="Solo acordes y estructura" onClick={() => { exportListZip(list, false); popAll(); }} />
          </Page>
        );
      }

      case 'print':
        return <PrintFlowPage fromHome={P.fromHome} songs={st.songs} cur={cur} onBack={pop}
          onPrint={job => { popAll(); setPrintJob(job); }} />;

      case 'qr':
        return (
          <Page title="Código QR" onBack={pop} backLabel="Volver">
            <div className="qr-holder"><img src={CONF.qrSvgPath || 'config/qr.svg'} alt="Código QR" /></div>
            <div className="dim-note center">{CONF.qrText || ''}</div>
          </Page>
        );

      case 'config':
        return (
          <Page title="Opciones" onBack={pop}>
            <RetroBtn icon="✎" text={editMode ? 'Terminar de modificar' : 'Modificar canción'}
              sub={editMode ? 'Volver a solo lectura' : 'Toca lo que quieras cambiar'} primary
              onClick={() => { setEditMode(e => !e); pop(); }} />
            <RetroBtn icon="⊕" text="Agregar canción" sub="Crea una desde cero" onClick={() => push('add-song')} />
            <RetroBtn icon="♬" text="Abrir canción" sub="Cambia de canción guardada" onClick={() => push('open-song', { action: s => openSongScreen(s.id), onPick: s => openSongScreen(s.id) })} />
            <RetroBtn icon="▣" text="Abrir lista" sub="Agregar y abrir listas" onClick={() => push('lists')} />
            <RetroBtn icon="✕" text="Borrar canción" sub={'Elimina «' + cur.meta.title + '»'} onClick={() => push('delete-song')} />
            <RetroBtn icon="⎙" text="Imprimir" sub="PDF de esta canción" onClick={() => push('print', { fromHome: false })} />
            <RetroBtn icon="⇪" text="Exportar lista" sub="Una lista completa en zip" onClick={() => push('export-list')} />
            <RetroBtn icon="⇪" text="Exportar canciones" sub="Actual, seleccionadas o todo" onClick={() => push('export-songs')} />
            <RetroBtn icon="✎" text="Exportar letra" sub="Formato OpenLP (.xml)" onClick={() => push('export-lyrics')} />
            <RetroBtn icon="⇣" text="Importar canciones" sub=".json o letra .xml" onClick={() => push('import')} />
            <RetroBtn icon="⌂" text="Inicio" sub="Pantalla principal" onClick={goHome} />
          </Page>
        );

      case 'delete-song':
        return (
          <Page title="Borrar canción" sub={st.songs.length > 1 ? '¿Seguro que quieres eliminar «' + cur.meta.title + '»? No se puede deshacer.' : 'No puedes borrar la única canción de la base de datos.'} onBack={pop}>
            {st.songs.length > 1 && (
              <RetroBtn icon="✕" text="Sí, borrar" primary onClick={() => { removeSong(cur.id); goHome(); }} />
            )}
            <RetroBtn icon="‹" text="Cancelar" onClick={pop} />
          </Page>
        );

      case 'help':
        return (
          <Page title="Ayuda" onBack={pop}>
            <div className="help-text">
              <p><b>Ver una canción</b> — ábrela desde Inicio u Opciones; se muestra solo lectura: datos, acordes por grupos (a, b, c…), estructura y letra.</p>
              <p><b>Modificar</b> — en Opciones toca «Modificar canción»; todo se convierte en botones: el tono, compás, tempo y capo; cada acorde con su nota; los grupos («agregar»), la estructura y cada párrafo de la letra. Toca lo que quieras cambiar.</p>
              <p><b>Compases</b> — si un compás queda incompleto verás una nota marcada con «agregar»; tócala para completarlo. «+ agregar otro compás» añade más.</p>
              <p><b>Metrónomo</b> — el botón ♩ se expande en el mismo lugar; el primer tiempo suena y brilla distinto.</p>
              <p><b>Listas</b> — agrupa canciones (Lista 1, Lista 2…, máximo 10) y ábrelas o expórtalas en zip.</p>
              <p><b>Exportar</b> — canciones en .json (zip si son varias) y letras en OpenLyrics (.xml) para OpenLP.</p>
            </div>
            <RetroBtn icon="▶" text="Ver explicación" sub="Guía completa" onClick={() => window.open(CONF.explanationPath || 'config/explicacion.html', '_blank')} />
          </Page>
        );

      case 'acomodo': {
        const mobile = isMobile();
        const opts = mobile
          ? [{ v: 'lyrics-top', l: 'Letra arriba · Acordes abajo' }, { v: 'chords-top', l: 'Acordes arriba · Letra abajo' },
             { v: 'lyrics-only', l: 'Solo letra' }, { v: 'chords-only', l: 'Solo acordes' }]
          : [{ v: 'lyrics-left', l: 'Letra izquierda · Acordes derecha' }, { v: 'chords-left', l: 'Acordes izquierda · Letra derecha' },
             { v: 'lyrics-only', l: 'Solo letra' }, { v: 'chords-only', l: 'Solo acordes' }];
        return (
          <Page title="Acomodo" onBack={pop}>
            {opts.map(o => (
              <RetroBtn key={o.v} icon={view === o.v ? '●' : '○'} text={o.l} selected={view === o.v}
                onClick={() => { setUi({ lyricsView: o.v }); pop(); }} />
            ))}
          </Page>
        );
      }

      case 'tone': {
        const tr = cur.meta.transpose || 0;
        const shown = transposeChord(cur.meta.key, tr, false);
        return (
          <Page title={'Tono · ' + shown} sub={tr !== 0 ? 'Original: ' + cur.meta.key + ' (' + (tr > 0 ? '+' : '') + tr + ' semitonos)' : 'Este es el tono original.'} onBack={pop}>
            <RetroBtn icon="♯" text="Aumentar medio tono" onClick={() => setMeta({ transpose: tr + 1 })} />
            <RetroBtn icon="♭" text="Disminuir medio tono" onClick={() => setMeta({ transpose: tr - 1 })} />
            {tr !== 0 && <RetroBtn icon="↺" text="Original" sub={'Volver a ' + cur.meta.key} onClick={() => setMeta({ transpose: 0 })} />}
            <RetroBtn icon="✎" text="Modificar tono original" sub="Elegir el nuevo tono base" onClick={() => push('tone-pick')} />
          </Page>
        );
      }

      case 'tone-pick':
        return (
          <Page title="Tono original" sub="Elige el nuevo tono base de la canción." onBack={pop}>
            <div className="letter-row wrap">
              {KEY_CHOICES.map(k => (
                <button key={k} className={'letter-opt' + (cur.meta.key === k ? ' on' : '')}
                  onClick={() => { setMeta({ key: k, transpose: 0 }); pop(); pop(); }}>{k}</button>
              ))}
            </div>
          </Page>
        );

      case 'time-pick':
        return (
          <Page title="Compás" onBack={pop}>
            {TIME_OPTIONS.map(t => (
              <RetroBtn key={t} icon={cur.meta.time === t ? '●' : '○'} text={t} selected={cur.meta.time === t}
                onClick={() => { setMeta({ time: t }); pop(); }} />
            ))}
          </Page>
        );

      case 'tempo-edit':
        return <NumberEditPage title="Tempo" unit="bpm" value={cur.meta.tempo} min={30} max={300}
          onBack={pop} onSave={v => { setMeta({ tempo: String(v) }); pop(); }} />;

      case 'capo-edit':
        return <NumberEditPage title="Capo" unit="traste" value={cur.meta.capo} min={0} max={12}
          onBack={pop} onSave={v => { setMeta({ capo: String(v) }); pop(); }} />;

      case 'cell-edit': {
        const g = cur.groups[P.gi];
        const cell = P.ci != null ? g.measures[P.ci] : null;
        return <CellEditor initial={cell || { chord: '', dur: P.presetDur || 'quarter' }} isNew={P.ci == null}
          onBack={pop}
          onDelete={P.ci != null ? () => { removeCell(P.gi, P.ci); pop(); } : null}
          onAccept={c => { setCell(P.gi, P.ci, c); pop(); }} />;
      }

      case 'part-edit': {
        const letters = cur.groups.map((g, i) => ({ id: g.id, letter: letterFor(i) }));
        const part = P.pi != null ? cur.structure[P.pi] : null;
        return <StructureEditor initial={part} isNew={P.pi == null} letters={letters}
          onBack={pop}
          onDelete={P.pi != null ? () => { removePart(P.pi); pop(); } : null}
          onSave={data => { savePart(P.pi, data); pop(); }} />;
      }

      case 'lyric-edit': {
        const sec = P.li != null ? cur.lyrics[P.li] : null;
        return <LyricParagraphEditor initial={sec} isNew={P.li == null}
          onBack={pop}
          onDelete={P.li != null ? () => { removeLyric(P.li); pop(); } : null}
          onSave={data => { saveLyric(P.li, data); pop(); }} />;
      }

      default:
        return <Page title="…" onBack={pop} />;
    }
  }

  // =================================================================
  // SONG SCREEN
  const view = st.ui.lyricsView || (isMobile() ? 'chords-top' : 'chords-left');
  const tr = cur.meta.transpose || 0;
  const shownKey = transposeChord(cur.meta.key, tr, false);
  const capoN = parseInt(cur.meta.capo, 10) || 0;
  const letterById = Object.fromEntries(cur.groups.map((g, i) => [g.id, letterFor(i)]));

  const chordsSection = (
    <div className="song-block" key="chords">
      <div className="block-h">ACORDES</div>
      {cur.groups.map((g, gi) => (
        <div className="grp" key={g.id}>
          <span className="glabel">{letterFor(gi)}
            {editMode && <button className="gdel" onClick={() => removeGroup(gi)} aria-label="Eliminar grupo">✕</button>}
          </span>
          <ChordBars group={g} timeSig={cur.meta.time} transpose={tr} editMode={editMode}
            onEditCell={ci => push('cell-edit', { gi, ci })}
            onAddCell={fig => push('cell-edit', { gi, ci: null, presetDur: fig })}
            onAddBar={() => push('cell-edit', { gi, ci: null })} />
        </div>
      ))}
      {cur.groups.length === 0 && !editMode && <div className="dim-note">Sin acordes todavía.</div>}
      {editMode && (
        <button className="addgroup-btn" onClick={addGroup}>
          <span className="glabel small">{letterFor(cur.groups.length)}</span> agregar
        </button>
      )}
    </div>
  );

  const structureSection = (
    <div className="song-block" key="structure">
      <div className="block-h">ESTRUCTURA</div>
      <StructureLine structure={cur.structure} letterById={letterById} editMode={editMode}
        onEditPart={pi => push('part-edit', { pi })}
        onAddPart={() => push('part-edit', { pi: null })} />
    </div>
  );

  const lyricsSection = (
    <div className="song-block" key="lyrics">
      <div className="block-h">LETRA</div>
      {(!cur.lyrics || cur.lyrics.length === 0) ? (
        <RetroBtn icon="⊕" text="Agregar letra" sub="Escribe la primera sección" onClick={() => push('lyric-edit', { li: null })} />
      ) : (
        <div className="lyrics">
          {editMode && (
            <button className="addbar-btn wide" onClick={() => push('lyric-edit', { li: null })}>+ agregar párrafo</button>
          )}
          {cur.lyrics.map((s, li) => (
            <button key={s.id} className={'lyric-sec' + (editMode ? ' editable' : '')} disabled={!editMode}
              onClick={() => push('lyric-edit', { li })}>
              {s.name && <span className="lyric-name">{s.name}</span>}
              <span className="lyric-text">{s.text}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );

  const chordsCol = <div className="col" key="cc">{chordsSection}{structureSection}</div>;
  let songBody;
  if (view === 'chords-only') songBody = chordsCol;
  else if (view === 'lyrics-only') songBody = lyricsSection;
  else if (view === 'lyrics-left') songBody = <div className="split-h">{lyricsSection}{chordsCol}</div>;
  else if (view === 'chords-left') songBody = <div className="split-h">{chordsCol}{lyricsSection}</div>;
  else if (view === 'lyrics-top') songBody = <div className="split-v">{lyricsSection}{chordsCol}</div>;
  else songBody = <div className="split-v">{chordsCol}{lyricsSection}</div>;

  const metaLine = editMode ? (
    <div className="meta-line editing">
      <button className="meta-btn" onClick={() => push('tone')}>TONO {shownKey}</button>
      <button className="meta-btn" onClick={() => push('time-pick')}>COMPÁS {cur.meta.time}</button>
      <button className="meta-btn" onClick={() => push('tempo-edit')}>TEMPO {cur.meta.tempo} BPM</button>
      <button className="meta-btn" onClick={() => push('capo-edit')}>CAPO {cur.meta.capo}</button>
      <span className="meta-btn static">
        TAMAÑO
        <button className="sz" onClick={() => setUi({ scale: Math.max(0.7, +(st.ui.scale - 0.1).toFixed(2)) })}>A−</button>
        <button className="sz" onClick={() => setUi({ scale: Math.min(1.8, +(st.ui.scale + 0.1).toFixed(2)) })}>A+</button>
      </span>
      <span className="meta-btn static">
        TÍTULO
        <button className="sz" onClick={() => setUi({ titleScale: Math.max(0.6, +(st.ui.titleScale - 0.1).toFixed(2)) })}>A−</button>
        <button className="sz" onClick={() => setUi({ titleScale: Math.min(2, +(st.ui.titleScale + 0.1).toFixed(2)) })}>A+</button>
      </span>
    </div>
  ) : (
    <div className="meta-line">
      COMPÁS {cur.meta.time} · TONO {shownKey} · TEMPO {cur.meta.tempo} bpm{capoN > 0 ? ' · CAPO ' + cur.meta.capo : ''}
    </div>
  );

  const songScreen = (
    <div className="app song-screen">
      <header className="topbar no-print-controls">
        <div className="top-left">
          <TopBtn text="‹ INICIO" onClick={goHome} />
          {fromListId && <TopBtn text="VOLVER A LISTA" onClick={() => push('list-songs', { listId: fromListId })} />}
        </div>
        <div className="top-right">
          <TopBtn text="ACOMODO" onClick={() => push('acomodo')} />
          <TopBtn text={st.ui.theme === 'dark' ? 'CLARO' : 'OSCURO'} onClick={() => setUi({ theme: st.ui.theme === 'dark' ? 'light' : 'dark' })} />
          <TopBtn text="OPCIONES" primary onClick={() => push('config')} />
          <TopBtn text="?" onClick={() => push('help')} />
        </div>
      </header>

      <div className="titlebar">
        {editMode ? (
          <input className="song-title edit-title" value={cur.meta.title}
            onChange={e => setMeta({ title: e.target.value })} aria-label="Título" />
        ) : (
          <h1 className="song-title">{cur.meta.title}</h1>
        )}
        {editMode && <div className="edit-hint">Toca lo que quieras modificar.</div>}
      </div>

      {metaLine}
      <Metronome tempo={cur.meta.tempo} timeSig={cur.meta.time} open={metroOpen} onToggle={() => setMetroOpen(o => !o)} />
      {songBody}
    </div>
  );

  // =================================================================
  // HOME SCREEN
  const homeScreen = (
    <div className="home">
      <div className="home-brand">
        <img className="home-icon" src={CONF.iconPath || 'config/icon.svg'} alt="" />
        {CONF.appNameSvgPath
          ? <img className="home-namesvg" src={CONF.appNameSvgPath} alt={CONF.appName || 'Acordes'} />
          : <div className="home-name">{CONF.appName || 'ACORDES'}</div>}
        <div className="home-sub">// {CONF.subtitle || 'Editor de canciones'}</div>
        <div className="home-divider" />
      </div>
      <div className="home-menu">
        <RetroBtn icon="♬" text="Abrir canción" sub={st.songs.length + (st.songs.length === 1 ? ' canción guardada' : ' canciones guardadas')} primary
          onClick={() => push('open-song', { action: s => openSongScreen(s.id), onPick: s => openSongScreen(s.id) })} />
        <RetroBtn icon="⊕" text="Agregar canción" sub="Crea una desde cero" onClick={() => push('add-song')} />
        <RetroBtn icon="▣" text="Listas" sub={st.lists.length + ' de ' + MAX_LISTS + ' guardadas'} onClick={() => push('lists')} />
        <RetroBtn icon="⇣" text="Importar canciones" sub=".json o letra .xml" onClick={() => push('import')} />
        <RetroBtn icon="⇪" text="Exportar canciones" sub="Canciones, letras o todo" onClick={() => push('export-songs')} />
        <RetroBtn icon="⎙" text="Imprimir" sub="Una canción o toda la base" onClick={() => push('print', { fromHome: true })} />
        <RetroBtn icon="▦" text="Código QR" sub="Comparte el proyecto" onClick={() => push('qr')} />
        <RetroBtn icon={st.ui.theme === 'dark' ? '☀' : '◗'} text={st.ui.theme === 'dark' ? 'Color claro' : 'Color oscuro'} sub="Cambiar tema"
          onClick={() => setUi({ theme: st.ui.theme === 'dark' ? 'light' : 'dark' })} />
      </div>
    </div>
  );

  return (
    <React.Fragment>
      <input ref={fileRef} type="file" accept=".json,.xml,application/json,application/xml,text/xml"
        style={{ display: 'none' }} onChange={onFile} />
      <div className={printJob ? 'screen-root printing' : 'screen-root'}>
        {base === 'home' ? homeScreen : songScreen}
        {stack.map((pg, i) => (
          <div key={i} className="page-layer" style={{ zIndex: 50 + i }}>{renderPage(pg)}</div>
        ))}
      </div>
      {printJob && <PrintSheet job={printJob} />}
    </React.Fragment>
  );
}

// =================================================================
// Add-song page
function AddSongPage({ songs, onBack, onCreate }) {
  const { useState } = window.React;
  const [title, setTitle] = useState('');
  const [time, setTime] = useState('4/4');
  const [tempo, setTempo] = useState('120');
  const [capo, setCapo] = useState('0');
  const [withLyrics, setWithLyrics] = useState(false);
  const [sections, setSections] = useState([{ id: uid(), name: 'Verso 1', text: '' }]);
  const dupe = songs.some(s => (s.meta.title || '').trim().toLowerCase() === title.trim().toLowerCase()) && title.trim();
  const create = () => {
    if (dupe) return;
    onCreate(newSong({ title: title.trim() || 'Nueva canción', time, tempo, capo },
      withLyrics ? sections.filter(s => s.name || s.text) : []));
  };
  return (
    <Page title="Agregar canción" onBack={onBack}>
      <div className="ed-label">Título</div>
      <input className="input" autoFocus value={title} placeholder="Nombre de la canción" onChange={e => setTitle(e.target.value)} />
      {dupe && <div className="err-note">Ya existe una canción con ese título.</div>}
      <div className="ed-label">Compás</div>
      <div className="letter-row">
        {TIME_OPTIONS.map(t => (
          <button key={t} className={'letter-opt' + (time === t ? ' on' : '')} onClick={() => setTime(t)}>{t}</button>
        ))}
      </div>
      <div className="two-col">
        <div>
          <div className="ed-label">Tempo (bpm)</div>
          <input className="input" inputMode="numeric" value={tempo} onChange={e => setTempo(e.target.value)} />
        </div>
        <div>
          <div className="ed-label">Capo</div>
          <input className="input" inputMode="numeric" value={capo} onChange={e => setCapo(e.target.value)} />
        </div>
      </div>
      <div className="dim-note">El tono se calcula solo a partir de los acordes; también puedes fijarlo después en «Modificar canción».</div>
      <div className="ed-label">Letra</div>
      {!withLyrics ? (
        <RetroBtn icon="⊕" text="Agregar letra" onClick={() => setWithLyrics(true)} />
      ) : (
        <div className="addsong-lyrics">
          {sections.map((s, i) => (
            <div className="lyr-block" key={s.id}>
              <button className="lyr-del" onClick={() => setSections(x => x.filter((_, k) => k !== i))}>✕</button>
              <SectionNamePicker value={s.name} onChange={n => setSections(x => x.map((y, k) => k === i ? { ...y, name: n } : y))} />
              <textarea className="input lyric-ta" placeholder="Texto de la sección…" value={s.text}
                onChange={e => setSections(x => x.map((y, k) => k === i ? { ...y, text: e.target.value } : y))} />
            </div>
          ))}
          <button className="addbar-btn" onClick={() => setSections(x => [...x, { id: uid(), name: 'Coro', text: '' }])}>+ añadir sección</button>
        </div>
      )}
      <div className="ed-actions">
        <RetroBtn icon="✓" text="Crear canción" primary disabled={!!dupe} onClick={create} />
      </div>
    </Page>
  );
}

// Numeric editor page
function NumberEditPage({ title, unit, value, min, max, onBack, onSave }) {
  const { useState } = window.React;
  const [v, setV] = useState(parseInt(value, 10) || min);
  const adj = d => setV(x => Math.min(max, Math.max(min, x + d)));
  return (
    <Page title={title} onBack={onBack}>
      <div className="num-editor">
        <button className="letter-opt" onClick={() => adj(-5)}>«</button>
        <button className="letter-opt" onClick={() => adj(-1)}>–</button>
        <span className="num-val">{v} <small>{unit}</small></span>
        <button className="letter-opt" onClick={() => adj(1)}>+</button>
        <button className="letter-opt" onClick={() => adj(5)}>»</button>
      </div>
      <div className="ed-actions">
        <RetroBtn icon="✓" text="Guardar" primary onClick={() => onSave(v)} />
      </div>
    </Page>
  );
}

// Multi-select songs page
function SelectSongsPage({ songs, title, actionLabel, onBack, onDone }) {
  const { useState } = window.React;
  const [sel, setSel] = useState([]);
  const toggle = id => setSel(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  return (
    <Page title={title} sub="Toca para seleccionar." onBack={onBack}>
      {songs.map(s => (
        <RetroBtn key={s.id} icon={sel.includes(s.id) ? '☑' : '☐'} text={s.meta.title || 'Sin título'}
          selected={sel.includes(s.id)}
          sub={'Tono ' + (s.meta.key || '—') + ' · ' + s.meta.time} onClick={() => toggle(s.id)} />
      ))}
      <div className="ed-actions">
        <RetroBtn icon="✓" text={actionLabel + (sel.length ? ' (' + sel.length + ')' : '')} primary disabled={!sel.length}
          onClick={() => onDone(sel)} />
      </div>
    </Page>
  );
}

// Add-list page (select songs, save)
function AddListPage({ songs, name, onBack, onSave }) {
  const { useState } = window.React;
  const [sel, setSel] = useState([]);
  const toggle = id => setSel(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  return (
    <Page title={'Agregar ' + (name || 'lista')} sub="Selecciona las canciones de la lista." onBack={onBack}>
      {songs.map(s => (
        <RetroBtn key={s.id} icon={sel.includes(s.id) ? '☑' : '☐'} text={s.meta.title || 'Sin título'}
          selected={sel.includes(s.id)}
          sub={'Tono ' + (s.meta.key || '—') + ' · ' + s.meta.time} onClick={() => toggle(s.id)} />
      ))}
      <div className="ed-actions">
        <RetroBtn icon="✓" text={'Guardar' + (sel.length ? ' (' + sel.length + ')' : '')} primary disabled={!sel.length}
          onClick={() => onSave(sel)} />
      </div>
    </Page>
  );
}

// Print flow: pick song (home) -> orientation -> layout -> print
function PrintFlowPage({ fromHome, songs, cur, onBack, onPrint }) {
  const { useState } = window.React;
  const [picked, setPicked] = useState(fromHome ? null : [cur]);
  const [orientation, setOrientation] = useState(null);
  if (fromHome && !picked) {
    return (
      <Page title="Imprimir" sub="¿Qué quieres imprimir?" onBack={onBack}>
        <RetroBtn icon="▣" text="Toda la base de datos" sub={songs.length + ' canciones'} onClick={() => setPicked(songs)} />
        {songs.map(s => (
          <RetroBtn key={s.id} icon="♬" text={s.meta.title || 'Sin título'} sub={'Tono ' + (s.meta.key || '—')} onClick={() => setPicked([s])} />
        ))}
      </Page>
    );
  }
  if (!orientation) {
    return (
      <Page title="Imprimir" sub="Elige la orientación de la hoja." onBack={fromHome ? () => setPicked(null) : onBack}>
        <RetroBtn icon="▯" text="Vertical" sub="Hoja carta vertical" onClick={() => setOrientation('vertical')} />
        <RetroBtn icon="▭" text="Horizontal" sub="Hoja carta horizontal, todo en una página" onClick={() => setOrientation('horizontal')} />
      </Page>
    );
  }
  const opts = orientation === 'horizontal'
    ? [{ v: 'lyrics-left', l: 'Letra izquierda · Acordes derecha' }, { v: 'chords-left', l: 'Acordes izquierda · Letra derecha' }]
    : [{ v: 'both', l: 'Acordes y letra' }, { v: 'chords-only', l: 'Solo acordes' }, { v: 'lyrics-only', l: 'Solo letra' },
       { v: 'lyrics-left', l: 'Letra izquierda · Acordes derecha' }, { v: 'chords-left', l: 'Acordes izquierda · Letra derecha' }];
  return (
    <Page title="Imprimir" sub="Elige el acomodo." onBack={() => setOrientation(null)}>
      {opts.map(o => (
        <RetroBtn key={o.v} icon="⎙" text={o.l} onClick={() => onPrint({ songs: picked, layout: o.v, orientation })} />
      ))}
    </Page>
  );
}

// ---- Print sheet (rendered only while printing) ----
function PrintSheet({ job }) {
  const sideBySide = job.layout === 'lyrics-left' || job.layout === 'chords-left';
  const cls = 'print-sheet' + (sideBySide ? ' side' : '') + (job.orientation === 'horizontal' ? ' landscape' : '');
  return (
    <div className={cls}>
      {job.songs.map((s, i) => <PrintSong key={s.id || i} song={s} layout={job.layout} last={i === job.songs.length - 1} />)}
    </div>
  );
}

function PrintSong({ song, layout, last }) {
  const tr = song.meta.transpose || 0;
  const key = transposeChord(song.meta.key || detectKey(song.groups), tr, false);
  const capoN = parseInt(song.meta.capo, 10) || 0;
  const letterById = Object.fromEntries(song.groups.map((g, i) => [g.id, letterFor(i)]));
  const showChords = layout !== 'lyrics-only';
  const showLyrics = layout !== 'chords-only';
  const sideBySide = layout === 'lyrics-left' || layout === 'chords-left';

  const chordsBlock = showChords && (
    <div className="p-chords">
      <div className="p-h">ACORDES</div>
      {song.groups.map((g, gi) => (
        <div className="p-grp" key={g.id}>
          <span className="p-glabel">{letterFor(gi)}</span>
          <div className="bars p-bars">
            {g.measures.map((m, i) => {
              const shown = transposeChord(m.chord, tr, false);
              return (
                <span key={i} className="mcell p-cell">
                  {shown ? <span className="chord">{shown}</span> : null}
                  <span className="figbox"><NoteFigure type={m.dur} /></span>
                </span>
              );
            })}
          </div>
        </div>
      ))}
      {song.structure.length > 0 && (
        <React.Fragment>
          <div className="p-h">ESTRUCTURA</div>
          <div className="bars p-bars structure-bars">
            {song.structure.map(p => (
              <span key={p.id} className="mcell scell p-cell">
                <span className="sname">{p.name}</span>
                <span className="sletter">{letterById[p.groupId] || '—'}</span>
                {p.reps > 1 && <span className="sreps">×{p.reps}</span>}
              </span>
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );

  const lyricsBlock = showLyrics && song.lyrics && song.lyrics.length > 0 && (
    <div className="p-lyrics">
      <div className="p-lyr-inner">
        <div className="p-h">LETRA</div>
        {song.lyrics.map(s => (
          <div className="p-lyr-sec" key={s.id}>
            {s.name && <div className="p-lyr-name">{s.name}</div>}
            <div className="p-lyr-text">{s.text}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className={'p-song' + (last ? '' : ' page-break')}>
      <div className="p-project">{(window.APP_CONFIG || {}).appName || 'ACORDES'}</div>
      <div className="p-title"><span className="p-dot" />{song.meta.title}</div>
      <div className="p-meta">COMPÁS {song.meta.time} · TONO {key} · TEMPO {song.meta.tempo} bpm{capoN > 0 ? ' · CAPO ' + song.meta.capo : ''}</div>
      {sideBySide ? (
        <div className={'p-cols' + (layout === 'lyrics-left' ? ' lyr-first' : '')}>
          {layout === 'lyrics-left' ? lyricsBlock : chordsBlock}
          {layout === 'lyrics-left' ? chordsBlock : lyricsBlock}
        </div>
      ) : (
        <React.Fragment>{chordsBlock}{lyricsBlock}</React.Fragment>
      )}
    </div>
  );
}

window.ReactDOM.createRoot(document.getElementById('root')).render(<App />);
