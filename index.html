<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Musigatari — Aprendiendo Canciones</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF9201">
<meta name="ext-resource-dependency" content="config/icon.svg">
<meta name="ext-resource-dependency" content="config/qr.svg">
<meta name="ext-resource-dependency" content="config/explicacion.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Special+Elite&family=Share+Tech+Mono&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --scale: 1;
    --title-scale: 1;
    --font-ui: 'Oswald', sans-serif;
    --font-brand: 'Special Elite', serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  /* ---- RETRO '79 DARK ---- */
  html[data-theme="dark"] {
    --bg:       #202020;
    --s1:       #2a2722;
    --s2:       #333028;
    --s3:       #3c382e;
    --text:     #EAE0C7;
    --text-dim: #8a857a;
    --accent:   #FF9201;
    --primary:  #FBBA00;
    --teal:     #44ABB4;
    --err:      #e05c4a;
    --btn-shadow: 2px 2px 0 rgba(0, 0, 0, 0.45);
  }
  /* ---- RETRO '79 LIGHT (gris claro, texto negro 80%) ---- */
  html[data-theme="light"] {
    --bg:       #C6C2B6;
    --s1:       #D6D1C3;
    --s2:       #E1DCCE;
    --s3:       #A9A496;
    --text:     #333333;
    --text-dim: #6f6a5e;
    --accent:   #D66F00;
    --primary:  #A87400;
    --teal:     #2E7B82;
    --err:      #B23A28;
    --btn-shadow: 2px 2px 0 rgba(60, 55, 40, 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    transition: background .2s;
  }
  button { font-family: inherit; cursor: pointer; }
  h1 { margin: 0; }

  /* ══════════ RETRO BUTTON ══════════ */
  .retro-btn {
    width: 100%; max-width: 400px;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--accent);
    padding: 13px 18px;
    display: flex; align-items: center; gap: 16px;
    color: var(--text);
    user-select: none; text-align: left;
    box-shadow: var(--btn-shadow);
    transition: background .15s, box-shadow .1s, transform .1s;
  }
  .retro-btn:hover { background: var(--s2); }
  .retro-btn:active { transform: translateY(1px); box-shadow: none; }
  .retro-btn:disabled { opacity: .45; cursor: default; }
  .retro-btn.primary { border-left-color: var(--primary); background: var(--s2); }
  .retro-btn.primary .retro-btn-icon, .retro-btn.primary .retro-btn-text { color: var(--primary); }
  .retro-btn.selected { border-left-color: var(--primary); }
  .retro-btn.selected .retro-btn-text { color: var(--primary); }
  .retro-btn-icon { font-size: 20px; color: var(--accent); width: 24px; text-align: center; flex-shrink: 0; }
  .retro-btn-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .retro-btn-text {
    font-family: var(--font-ui); font-weight: 400; font-size: 14px;
    color: var(--text); letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .retro-btn-sub {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    letter-spacing: .5px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .back-btn { max-width: 220px; margin: 0 auto; }

  /* small top toolbar buttons */
  .top-btn {
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--text); font-family: var(--font-ui); font-weight: 400;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    padding: 7px 12px; box-shadow: var(--btn-shadow);
    transition: background .15s, transform .1s, box-shadow .1s;
  }
  .top-btn:hover { background: var(--s2); }
  .top-btn:active { transform: translateY(1px); box-shadow: none; }
  .top-btn.primary { border-left-color: var(--primary); color: var(--primary); }

  /* ══════════ FULL-SCREEN PAGES ══════════ */
  .page-layer { position: fixed; inset: 0; }
  .page {
    position: absolute; inset: 0; background: var(--bg);
    overflow-y: auto;
  }
  .page-inner {
    min-height: 100%;
    max-width: 460px; margin: 0 auto; padding: 44px 20px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .page-inner.wide { max-width: 640px; }
  .page-title {
    font-family: var(--font-brand); font-size: 22px; color: var(--primary);
    letter-spacing: 3px; text-align: center; text-transform: uppercase;
  }
  .page-sub {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; text-align: center; max-width: 340px; line-height: 1.6;
  }
  .page-opts { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 6px; }

  .dim-note { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: .5px; line-height: 1.6; max-width: 380px; }
  .dim-note.center { text-align: center; }
  .err-note { font-family: var(--font-mono); font-size: 11px; color: var(--err); letter-spacing: .5px; }

  /* editor pieces inside pages */
  .ed-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--teal);
    letter-spacing: 2px; text-transform: uppercase; align-self: flex-start; margin-top: 10px;
  }
  .input {
    width: 100%; max-width: 400px;
    font-family: var(--font-ui); font-weight: 300; font-size: 16px;
    color: var(--text); background: var(--s1);
    border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    padding: 11px 14px; outline: none;
  }
  .input:focus { background: var(--s2); border-left-color: var(--primary); }
  textarea.input, .lyric-ta { min-height: 110px; resize: vertical; line-height: 1.6; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
  .ed-actions { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 16px; flex-wrap: wrap; }
  .ed-actions .retro-btn { flex: 1; min-width: 150px; }

  .letter-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 400px; }
  .letter-row.wrap { max-width: 460px; }
  .letter-opt {
    min-width: 48px; height: 44px; padding: 0 12px;
    background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-ui); font-size: 17px; letter-spacing: 1px;
    box-shadow: var(--btn-shadow);
  }
  .letter-opt:hover { background: var(--s2); }
  .letter-opt:active { transform: translateY(1px); box-shadow: none; }
  .letter-opt.on { border-color: var(--primary); color: var(--primary); background: var(--s2); }
  .letter-opt.dim { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  .mods-row, .name-list { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 400px; }
  .mod-opt {
    padding: 9px 13px; background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-ui); font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: var(--btn-shadow);
  }
  .mod-opt:hover { background: var(--s2); }
  .mod-opt.on { border-color: var(--primary); color: var(--primary); background: var(--s2); }

  .fig-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 460px; }
  .fig-opt {
    flex: 1; min-width: 76px;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px;
    padding: 10px 6px; min-height: 96px;
    background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: var(--btn-shadow);
  }
  .fig-opt .figbox { color: var(--text); display: flex; align-items: flex-end; min-height: 52px; }
  .fig-opt.on { border-color: var(--primary); color: var(--primary); background: var(--s2); }
  .fig-opt.on .figbox { color: var(--primary); }

  .chord-preview {
    display: flex; align-items: center; gap: 14px; width: 100%; max-width: 400px;
    font-family: var(--font-ui); font-size: 30px; color: var(--primary);
  }
  .chip-btn {
    background: transparent; border: 1px solid var(--s3); color: var(--text-dim);
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 10px;
  }
  .chip-btn:hover { color: var(--accent); border-color: var(--accent); }
  .reps-editor { display: flex; align-items: center; gap: 10px; }
  .reps-num { font-family: var(--font-ui); font-size: 24px; color: var(--primary); min-width: 54px; text-align: center; }
  .num-editor { display: flex; align-items: center; gap: 10px; }
  .num-val { font-family: var(--font-ui); font-size: 30px; color: var(--primary); min-width: 120px; text-align: center; }
  .num-val small { font-size: 13px; color: var(--text-dim); }

  .namepick { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }

  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; width: 100%; max-width: 420px; }
  .folder-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 16px 8px 12px; background: var(--s1); border: 1px solid var(--s3);
    border-left: 3px solid var(--accent); color: var(--accent);
    box-shadow: var(--btn-shadow);
  }
  .folder-btn:hover { background: var(--s2); }
  .folder-btn span { font-family: var(--font-ui); font-size: 18px; color: var(--text); letter-spacing: 1px; }

  .qr-holder { background: #fff; padding: 16px; box-shadow: var(--btn-shadow); border: 1px solid var(--s3); }
  .qr-holder img { display: block; width: 230px; height: 230px; }

  .help-text { max-width: 420px; font-weight: 300; font-size: 14.5px; line-height: 1.7; letter-spacing: .3px; }
  .help-text p { margin: 0 0 12px; }
  .help-text b { font-weight: 500; color: var(--primary); text-transform: uppercase; font-size: 12.5px; letter-spacing: 1px; }

  .addsong-lyrics { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; }
  .lyr-block { position: relative; display: flex; flex-direction: column; gap: 8px; padding: 12px; border: 1px solid var(--s3); background: var(--s1); }
  .lyr-del { position: absolute; top: 6px; right: 6px; z-index: 2; background: transparent; border: 0; color: var(--text-dim); font-size: 14px; }
  .lyr-del:hover { color: var(--err); }

  /* ══════════ HOME ══════════ */
  .home {
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 44px 20px; gap: 26px;
  }
  .home-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .home-icon { width: 88px; height: 88px; object-fit: contain; }
  .home-name { font-family: var(--font-brand); font-size: 30px; color: var(--primary); letter-spacing: 5px; text-align: center; }
  .home-namesvg { max-width: 300px; max-height: 60px; }
  .home-sub { font-family: var(--font-mono); font-size: 10px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; }
  .home-divider { width: 300px; height: 1px; background: var(--s3); margin-top: 8px; }
  .home-menu { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }

  /* ══════════ SONG SCREEN ══════════ */
  .app { max-width: 1240px; margin: 0 auto; padding: 18px clamp(12px, 3vw, 36px) 80px; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .top-left, .top-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .titlebar { margin-bottom: 8px; }
  .song-title {
    font-family: var(--font-brand); font-weight: 400;
    font-size: calc(30px * var(--title-scale)); color: var(--primary);
    letter-spacing: 2px; line-height: 1.15;
  }
  .edit-title {
    width: 100%; background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--primary);
    padding: 6px 12px; outline: none;
  }
  .edit-hint { font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 1px; margin-top: 8px; text-transform: uppercase; }

  .meta-line {
    font-family: var(--font-mono); font-size: calc(12px * var(--scale)); color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .meta-btn {
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--text); font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    padding: 8px 12px; text-transform: uppercase; box-shadow: var(--btn-shadow);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .meta-btn:hover { background: var(--s2); }
  .meta-btn.static { cursor: default; }
  .meta-btn .sz {
    background: var(--s2); border: 1px solid var(--s3); color: var(--accent);
    font-family: var(--font-ui); font-size: 11px; padding: 3px 8px;
  }
  .meta-btn .sz:hover { color: var(--primary); }

  /* metronome inline */
  .metro-inline { margin-bottom: 20px; }
  .metro-toggle { cursor: pointer; }
  .metro-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .metro-inline.open .metro-body { max-height: 140px; }
  .metro-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 16px 4px 6px; }
  .metro-play {
    width: 46px; height: 46px; border: 1px solid var(--s3); border-left: 3px solid var(--primary);
    background: var(--s1); color: var(--primary); font-size: 16px; box-shadow: var(--btn-shadow);
  }
  .metro-play:active { transform: translateY(1px); box-shadow: none; }
  .metro-bpm { font-family: var(--font-ui); font-weight: 400; font-size: 30px; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
  .metro-bpm small { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
  .metro-controls { display: inline-flex; gap: 6px; }
  .metro-step {
    width: 32px; height: 32px; background: var(--s1); border: 1px solid var(--s3);
    color: var(--accent); font-size: 15px; padding: 0; box-shadow: var(--btn-shadow);
  }
  .metro-step:active { transform: translateY(1px); box-shadow: none; }
  .metro-dots { display: flex; gap: 12px; align-items: center; }
  .mdot-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; }
  .mdot { width: 13px; height: 13px; border-radius: 50%; background: var(--accent); opacity: .25; transition: opacity .06s, transform .06s; }
  .mdot.on { opacity: 1; transform: scale(1.15); }
  .mdot-wrap.first::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: var(--accent); opacity: .18; transform: scale(.6); transition: opacity .06s, transform .06s;
  }
  .mdot-wrap.first:has(.mdot.on)::before { opacity: .4; transform: scale(1.25); }
  .metro-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  /* song blocks */
  .song-block { margin-bottom: 30px; min-width: 0; }
  .block-h {
    font-family: var(--font-mono); font-size: 11px; color: var(--teal);
    letter-spacing: 3px; text-transform: uppercase;
    border-bottom: 1px solid var(--s3); padding-bottom: 7px; margin-bottom: 16px;
  }
  .col { min-width: 0; }
  .split-h { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; align-items: start; }
  .split-v { display: flex; flex-direction: column; }
  @media (max-width: 820px) { .split-h { grid-template-columns: 1fr; gap: 0; } }

  .grp { display: flex; gap: 14px; margin-bottom: 20px; align-items: center; }
  .glabel {
    position: relative;
    font-family: var(--font-ui); font-weight: 400;
    font-size: calc(20px * var(--scale)); color: var(--accent);
    background: var(--s1); border: 1px solid var(--s3);
    width: calc(42px * var(--scale)); height: calc(42px * var(--scale));
    flex: none; display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--btn-shadow);
  }
  .glabel.small { width: 32px; height: 32px; font-size: 16px; box-shadow: none; }
  .gdel {
    position: absolute; top: -9px; right: -9px; width: 20px; height: 20px;
    border: 1px solid var(--s3); background: var(--s1); color: var(--text-dim);
    font-size: 11px; line-height: 1; padding: 0;
  }
  .gdel:hover { color: var(--err); border-color: var(--err); }

  /* ---- bars: every visual row auto-gets | at both ends ---- */
  .bars { display: flex; flex-wrap: wrap; align-items: stretch; align-content: flex-start; flex: 1; min-width: 0; row-gap: 14px; }
  .mcell {
    position: relative; flex: 0 0 auto;
    border: 0; border-left: 2px solid var(--text-dim); border-right: 2px solid var(--text-dim);
    margin-right: -2px;
    background: transparent; color: var(--text);
    padding: 4px 14px; display: flex; align-items: center; gap: 8px;
    min-height: calc(56px * var(--scale));
  }
  .mcell:disabled { cursor: default; }
  .mcell.editable { cursor: pointer; }
  .mcell.editable:hover { background: var(--s1); }
  .mcell .chord { font-family: var(--font-ui); font-weight: 400; font-size: calc(34px * var(--scale)); letter-spacing: .5px; line-height: 1; color: var(--text); }
  .mcell .figbox { display: inline-flex; align-items: center; color: var(--text); }
  .mcell.missing { border-left-style: none; margin-left: 0; }
  .mcell.missing { border: 1px dashed var(--err); border-left: 3px solid var(--err); margin-right: 0; color: var(--err); }
  .mcell.missing .figbox { color: var(--err); opacity: .9; }
  .miss-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--err); }

  .addbar-btn {
    align-self: center; margin-left: 12px;
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--accent); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; padding: 9px 13px;
    box-shadow: var(--btn-shadow); white-space: nowrap;
  }
  .addbar-btn:hover { background: var(--s2); }
  .addbar-btn:active { transform: translateY(1px); box-shadow: none; }
  .addbar-btn.wide { align-self: flex-start; margin: 0 0 14px; }

  .addgroup-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--accent); font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px;
    box-shadow: var(--btn-shadow);
  }
  .addgroup-btn:hover { background: var(--s2); }
  .addgroup-btn .glabel { color: var(--accent); }

  /* structure cells */
  .scell { gap: 10px; min-height: 46px; padding: 4px 16px; }
  .scell .sname { font-family: var(--font-ui); font-weight: 400; font-size: calc(17px * var(--scale)); letter-spacing: .5px; white-space: nowrap; }
  .scell .sletter {
    font-family: var(--font-ui); font-size: calc(17px * var(--scale)); color: var(--accent);
    background: var(--s1); border: 1px solid var(--s3);
    min-width: calc(30px * var(--scale)); height: calc(30px * var(--scale));
    display: inline-flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .scell .sreps { font-family: var(--font-mono); font-size: calc(13px * var(--scale)); color: var(--primary); letter-spacing: 1px; }

  /* lyrics */
  .lyrics { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .lyric-sec {
    display: flex; flex-direction: column; gap: 5px; text-align: left;
    background: transparent; border: 0; border-left: 3px solid transparent;
    padding: 2px 0 2px 12px; margin-left: -15px; color: var(--text); width: 100%;
  }
  .lyric-sec.editable { cursor: pointer; }
  .lyric-sec.editable:hover { border-left-color: var(--accent); background: var(--s1); }
  .lyric-sec:disabled { cursor: default; }
  .lyric-name { font-family: var(--font-mono); font-size: calc(11px * var(--scale)); color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .lyric-text { font-family: var(--font-ui); font-weight: 300; white-space: pre-wrap; line-height: 1.7; font-size: calc(15.5px * var(--scale)); color: var(--text); }

  /* hide screen while printing */
  @media print {
    .screen-root, .page-layer { display: none !important; }
    body { background: #fff; }
  }
  .print-sheet { display: none; }

  /* ══════════ PRINT SHEET ══════════ */
  @media print {
    .print-sheet {

  <script type="text/plain" id="data-script">
// Data model, music theory helpers, example song, OpenLyrics helpers.

const SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const FLAT  = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
const KEY_CHOICES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B',
                     'Cm','C#m','Dm','Ebm','Em','Fm','F#m','Gm','Abm','Am','Bbm','Bm'];

function noteIndex(n) {
  let i = SHARP.indexOf(n);
  if (i >= 0) return i;
  return FLAT.indexOf(n);
}

function transposeNote(note, semis, preferFlats) {
  const i = noteIndex(note);
  if (i < 0) return note;
  const j = ((i + semis) % 12 + 12) % 12;
  return (preferFlats ? FLAT : SHARP)[j];
}

function transposeChord(chord, semis, preferFlats) {
  if (!chord) return chord;
  const trimmed = chord.trim();
  if (!semis) return trimmed;
  if (trimmed === '%' || trimmed === '-' || trimmed === 'N.C.') return trimmed;
  return trimmed.split('/').map(part => {
    const m = part.match(/^([A-G][#b]?)(.*)$/);
    if (!m) return part;
    return transposeNote(m[1], semis, preferFlats) + m[2];
  }).join('/');
}

function letterFor(index) {
  let s = '';
  let n = index;
  do {
    s = String.fromCharCode(97 + (n % 26)) + s;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return s;
}

const RHYTHMS = [
  { id: 'whole',     es: 'Redonda',     beats: 4 },
  { id: 'half',      es: 'Blanca',      beats: 2 },
  { id: 'quarter',   es: 'Negra',       beats: 1 },
  { id: 'eighth',    es: 'Corchea',     beats: 0.5 },
  { id: 'sixteenth', es: 'Semicorchea', beats: 0.25 },
];
const BEAT_VALUES = { whole: 4, half: 2, quarter: 1, eighth: 0.5, sixteenth: 0.25 };

const TIME_OPTIONS = ['4/4', '3/4', '6/8', '2/4'];
const SECTION_NAMES = ['Coro', 'Verso 1', 'Verso 2', 'Verso 3', 'Pre-coro', 'Puente', 'Intro', 'Outro', 'Interludio', 'Solo'];

const TEMPO_NAMES = [
  { max: 60, name: 'Largo' }, { max: 76, name: 'Adagio' }, { max: 108, name: 'Andante' },
  { max: 120, name: 'Moderato' }, { max: 156, name: 'Allegro' }, { max: 200, name: 'Presto' },
  { max: 999, name: 'Prestissimo' },
];
function tempoName(bpm) {
  const t = TEMPO_NAMES.find(t => bpm <= t.max);
  return t ? t.name : '';
}

let _id = 0;
const uid = () => `id${++_id}_${Math.random().toString(36).slice(2, 6)}`;

function detectKey(groups) {
  if (!groups || !groups.length) return 'C';
  const counts = {};
  let firstChord = null;
  groups.forEach(g => (g.measures || []).forEach(m => {
    if (!m.chord) return;
    const mm = m.chord.trim().match(/^([A-G][#b]?)(.*)$/);
    if (!mm) return;
    if (!firstChord) firstChord = m.chord.trim();
    counts[mm[1]] = (counts[mm[1]] || 0) + 1;
  }));
  const roots = Object.keys(counts);
  if (!roots.length) return 'C';
  let best = roots[0];
  roots.forEach(r => { if (counts[r] > counts[best]) best = r; });
  const fm = (firstChord || '').match(/^([A-G][#b]?)(m(?!aj)|min)?/);
  if (fm && fm[1] === best && fm[2]) return best + 'm';
  return best;
}

function parseTimeSig(sig) {
  const p = (sig || '4/4').split('/').map(Number);
  return (p[0] || 4) * (4 / (p[1] || 4)); // quarter notes per bar
}
function beatsPerBar(sig) {
  const p = (sig || '4/4').split('/').map(Number);
  return p[0] || 4;
}

// Split a group's cells into complete bars. Returns array of bars:
// [{ cells: [ {measure, index} ], missing: beatsLeft }]
function splitBars(measures, timeSig) {
  const qnpm = parseTimeSig(timeSig);
  const bars = [];
  let cur = { cells: [], used: 0 };
  measures.forEach((m, i) => {
    const b = BEAT_VALUES[m.dur] || 1;
    cur.cells.push({ measure: m, index: i });
    cur.used += b;
    if (cur.used >= qnpm - 0.001) {
      bars.push({ cells: cur.cells, missing: 0 });
      cur = { cells: [], used: 0 };
    }
  });
  if (cur.cells.length) bars.push({ cells: cur.cells, missing: Math.max(0, qnpm - cur.used) });
  return bars;
}

// The largest rhythm figure that fits in `beats`
function figureForBeats(beats) {
  const r = RHYTHMS.find(r => r.beats <= beats + 0.001);
  return r ? r.id : 'sixteenth';
}

const clone = obj => JSON.parse(JSON.stringify(obj));

const LOREM = {
  verso: 'Lorem ipsum dolor sit amet, consectetur,\nadipiscing elit sed do eiusmod ya.\nTempor incididunt ut labore et dolore,\nmagna aliqua, enim ad minim hoy.',
  puente: 'Ut enim ad minim veniam, quis nostrud,\nexercitation ullamco laboris nisi.\nUt aliquip ex ea commodo consequat.',
  coro: 'Duis aute irure dolor in reprehenderit,\nin voluptate velit esse cillum hoy.\nExcepteur sint occaecat cupidatat,\nnon proident, sunt in culpa qui sí.',
};

const SAMPLE_SONG = {
  meta: { title: 'Lorem Ipsum', time: '4/4', key: 'C', tempo: '96', capo: '2', transpose: 0 },
  groups: [
    { id: uid(), measures: [
      { chord: 'C', dur: 'quarter' }, { chord: 'Am', dur: 'quarter' },
      { chord: 'F', dur: 'quarter' }, { chord: 'G', dur: 'quarter' },
    ] },
    { id: uid(), measures: [
      { chord: 'Dm', dur: 'eighth' }, { chord: 'G', dur: 'eighth' },
      { chord: 'C', dur: 'quarter' }, { chord: 'Am', dur: 'quarter' },
      { chord: 'F', dur: 'half' },
    ] },
    { id: uid(), measures: [
      { chord: 'F', dur: 'half' }, { chord: 'G', dur: 'half' },
      { chord: 'Am', dur: 'whole' },
    ] },
  ],
  structure: [],
  lyrics: [
    { id: uid(), name: 'Verso 1', text: LOREM.verso },
    { id: uid(), name: 'Puente', text: LOREM.puente },
    { id: uid(), name: 'Coro', text: LOREM.coro },
  ],
};
(function () {
  const g = SAMPLE_SONG.groups;
  SAMPLE_SONG.structure = [
    { id: uid(), name: 'Verso 1', groupId: g[1].id, reps: 2 },
    { id: uid(), name: 'Puente', groupId: g[2].id, reps: 1 },
    { id: uid(), name: 'Coro', groupId: g[0].id, reps: 3 },
  ];
})();

function newSong(meta, lyrics) {
  return {
    id: uid(),
    meta: { title: 'Nueva canción', time: '4/4', key: 'C', tempo: '120', capo: '0', transpose: 0, ...(meta || {}) },
    groups: [],
    structure: [],
    lyrics: lyrics || [],
  };
}

// ---------- OpenLyrics 0.9 ----------
function sectionBaseTag(name) {
  const n = (name || '').toLowerCase();
  if (/coro|estribillo|chorus/.test(n)) return 'c';
  if (/puente|bridge/.test(n)) return 'b';
  if (/pre.?coro|prechorus/.test(n)) return 'p';
  if (/intro/.test(n)) return 'i';
  if (/outro|final|ending/.test(n)) return 'e';
  return 'v';
}
function xmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function songToOpenLyrics(song) {
  const counters = {}; const verses = []; const nameToTag = {};
  (song.lyrics || []).forEach(sec => {
    const base = sectionBaseTag(sec.name);
    counters[base] = (counters[base] || 0) + 1;
    const tag = base + counters[base];
    nameToTag[sec.name] = tag;
    const lines = (sec.text || '').split('\n').map(l => xmlEscape(l)).join('<br/>');
    verses.push(`    <verse name="${tag}">\n      <lines>${lines}</lines>\n    </verse>`);
  });
  const order = []; const byBase = {};
  Object.keys(nameToTag).forEach(name => {
    const base = sectionBaseTag(name);
    (byBase[base] = byBase[base] || []).push(nameToTag[name]);
  });
  (song.structure || []).forEach(part => {
    const base = sectionBaseTag(part.name);
    const tags = byBase[base];
    if (!tags || !tags.length) return;
    for (let i = 0; i < (part.reps || 1); i++) order.push(tags[0]);
  });
  if (!order.length) order.push(...Object.values(nameToTag));
  const key = song.meta.key || detectKey(song.groups);
  const props = [
    `    <titles><title>${xmlEscape(song.meta.title)}</title></titles>`,
    `    <key>${xmlEscape(key)}</key>`,
    `    <timeSignature>${xmlEscape(song.meta.time)}</timeSignature>`,
    order.length ? `    <verseOrder>${order.join(' ')}</verseOrder>` : '',
  ].filter(Boolean).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<song xmlns="http://openlyrics.info/namespace/2009/song" version="0.9" createdIn="Acordes">
  <properties>
${props}
  </properties>
  <lyrics>
${verses.join('\n')}
  </lyrics>
</song>`;
}
function tagToName(tag) {
  const m = (tag || '').match(/^([a-z]+)(\d*)$/i);
  if (!m) return tag;
  const map = { v: 'Verso', c: 'Coro', b: 'Puente', p: 'Pre-coro', i: 'Intro', e: 'Outro' };
  const base = map[m[1].toLowerCase()] || 'Sección';
  return m[2] ? base + ' ' + m[2] : base;
}
function openLyricsToSong(xmlString) {
  const doc = new DOMParser().parseFromString(xmlString, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('XML inválido');
  const title = (doc.querySelector('title') || {}).textContent || 'Canción importada';
  const lyrics = [];
  doc.querySelectorAll('verse').forEach(v => {
    const tag = v.getAttribute('name') || '';
    let text = '';
    v.querySelectorAll('lines').forEach((linesEl, idx) => {
      const html = linesEl.innerHTML.replace(/<br\s*\/?>(\s*)/gi, '\n').replace(/<[^>]+>/g, '');
      const tmp = document.createElement('textarea');
      tmp.innerHTML = html;
      text += (idx ? '\n' : '') + tmp.value.trim();
    });
    lyrics.push({ id: uid(), name: tagToName(tag), text });
  });
  return { title, lyrics };
}

function safeName(s) { return (s || 'archivo').replace(/[^\wáéíóúñÁÉÍÓÚÑ -]+/g, '').trim().replace(/\s+/g, '_'); }

function downloadBlob(name, blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

Object.assign(window, {
  SHARP, FLAT, KEY_CHOICES, transposeChord, transposeNote, letterFor,
  RHYTHMS, BEAT_VALUES, TIME_OPTIONS, SECTION_NAMES, SAMPLE_SONG, uid, clone, newSong,
  parseTimeSig, beatsPerBar, splitBars, figureForBeats, tempoName,
  detectKey, songToOpenLyrics, openLyricsToSong, safeName, downloadBlob,
});

  </script>
  <script type="text/plain" id="components-script">
// Retro '79 UI pieces + music widgets.

const { useState, useRef, useEffect } = React;
const CFG = window.APP_CONFIG || {};

// ---- Retro button ----
function RetroBtn({ icon, text, sub, primary, onClick, disabled, className, selected }) {
  return (
    <button className={'retro-btn' + (primary ? ' primary' : '') + (selected ? ' selected' : '') + (className ? ' ' + className : '')}
      onClick={onClick} disabled={disabled}>
      {icon != null && <span className="retro-btn-icon">{icon}</span>}
      <span className="retro-btn-body">
        <span className="retro-btn-text">{text}</span>
        {sub && <span className="retro-btn-sub">{sub}</span>}
      </span>
    </button>
  );
}

// ---- Small toolbar button (retro, compact) ----
function TopBtn({ text, onClick, primary }) {
  return <button className={'top-btn' + (primary ? ' primary' : '')} onClick={onClick}>{text}</button>;
}

// ---- Full-screen page: title, Regresar, options ----
function Page({ title, sub, onBack, backLabel, children, wide }) {
  return (
    <div className="page">
      <div className={'page-inner' + (wide ? ' wide' : '')}>
        <div className="page-title">{title}</div>
        {sub && <div className="page-sub">{sub}</div>}
        {onBack && (
          <button className="retro-btn back-btn" onClick={onBack}>
            <span className="retro-btn-icon">‹</span>
            <span className="retro-btn-body"><span className="retro-btn-text">{backLabel || 'Regresar'}</span></span>
          </button>
        )}
        <div className="page-opts">{children}</div>
      </div>
    </div>
  );
}

// ---- Musical note figure; sizes from config ----
function NoteFigure({ type, scale = 1 }) {
  const cfg = (CFG.notes || {});
  const base = cfg.base || 30;
  let size = base;
  if (type === 'whole') size = base * (cfg.wholeScale != null ? cfg.wholeScale : 2);
  else if (type === 'half') size = base * (cfg.halfScale != null ? cfg.halfScale : 1);
  size *= scale;
  const filled = type !== 'whole' && type !== 'half';
  const hasStem = type !== 'whole';
  const flags = type === 'eighth' ? 1 : type === 'sixteenth' ? 2 : 0;
  return (
    <svg viewBox="0 0 24 34" height={size} width={size * 0.72}
         className={'notefig notefig-' + type}
         style={{ display: 'block', overflow: 'visible' }} aria-hidden="true">
      <ellipse cx="8" cy="25.5" rx="6.1" ry="4.4" transform="rotate(-22 8 25.5)"
        fill={filled ? 'currentColor' : 'none'}
        stroke="currentColor" strokeWidth={filled ? 0 : 2.1} />
      {hasStem && <line x1="13.7" y1="24.5" x2="13.7" y2="3.5"
        stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" />}
      {flags >= 1 && <path d="M13.7 3.5 C 21.5 6.5 21.5 13.5 16.8 16.2"
        fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" />}
      {flags >= 2 && <path d="M13.7 9 C 21.5 12 21.5 19 16.8 21.7"
        fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" />}
    </svg>
  );
}

// ---- Chord bars: | C♩ Am♩ | F♩ G♩ |  with wrap-safe bars ----
// Every cell carries left+right borders that overlap, so each visual row
// starts and ends with a bar automatically, even after wrapping.
function ChordBars({ group, timeSig, transpose, editMode, onEditCell, onAddCell, onAddBar }) {
  const bars = window.splitBars(group.measures, timeSig);
  const out = [];
  bars.forEach((bar, bi) => {
    bar.cells.forEach(({ measure, index }) => {
      const shown = window.transposeChord(measure.chord, transpose, false);
      out.push(
        <button key={'c' + index} className={'mcell' + (editMode ? ' editable' : '')}
          disabled={!editMode} onClick={() => onEditCell(index)}>
          {shown ? <span className="chord">{shown}</span> : null}
          <span className="figbox"><NoteFigure type={measure.dur} /></span>
        </button>
      );
    });
    if (bar.missing > 0 && editMode) {
      const fig = window.figureForBeats(bar.missing);
      out.push(
        <button key={'miss' + bi} className="mcell missing" onClick={() => onAddCell(fig)}>
          <span className="figbox"><NoteFigure type={fig} /></span>
          <span className="miss-label">agregar</span>
        </button>
      );
    }
  });
  if (editMode) {
    out.push(
      <button key="addbar" className="addbar-btn" onClick={onAddBar}>+ agregar otro compás</button>
    );
  }
  return <div className="bars">{out}</div>;
}

// ---- Cell (chord+figure) editor page ----
const CHORD_LETTERS = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
const CHORD_MODS = [
  { id: 'm',   label: 'm (menor)' },
  { id: '#',   label: '♯ sostenido' },
  { id: 'b',   label: '♭ bemol' },
  { id: 'dim', label: 'dim (disminuido)' },
  { id: '7',   label: '7 (séptima)' },
];

function parseChordParts(chord) {
  const m = (chord || '').match(/^([A-G])([#b]?)(m(?!aj))?(dim)?(7)?/);
  if (!m) return { letter: null, mods: [] };
  const mods = [];
  if (m[2] === '#') mods.push('#');
  if (m[2] === 'b') mods.push('b');
  if (m[3]) mods.push('m');
  if (m[4]) mods.push('dim');
  if (m[5]) mods.push('7');
  return { letter: m[1], mods };
}
function buildChord(letter, mods) {
  if (!letter) return '';
  let s = letter;
  if (mods.includes('#')) s += '#';
  if (mods.includes('b')) s += 'b';
  if (mods.includes('m')) s += 'm';
  if (mods.includes('dim')) s += 'dim';
  if (mods.includes('7')) s += '7';
  return s;
}

function CellEditor({ initial, isNew, onAccept, onDelete, onBack }) {
  const parsed = parseChordParts(initial ? initial.chord : '');
  const [letter, setLetter] = useState(parsed.letter);
  const [mods, setMods] = useState(parsed.mods);
  const [dur, setDur] = useState(initial ? initial.dur : 'quarter');
  const toggleMod = id => setMods(ms => {
    let next = ms.includes(id) ? ms.filter(x => x !== id) : [...ms, id];
    if (id === '#') next = next.filter(x => x !== 'b' || id === x);
    if (id === 'b') next = next.filter(x => x !== '#' || id === x);
    return next;
  });
  return (
    <Page title={isNew ? 'Agregar acorde' : 'Modificar acorde'} onBack={onBack}>
      <div className="ed-label">Nota (figura rítmica)</div>
      <div className="fig-row">
        {window.RHYTHMS.map(r => (
          <button key={r.id} className={'fig-opt' + (dur === r.id ? ' on' : '')} onClick={() => setDur(r.id)}>
            <span className="figbox"><NoteFigure type={r.id} scale={0.8} /></span>
            <span>{r.es}</span>
          </button>
        ))}
      </div>
      <div className="ed-label">Acorde</div>
      {letter == null ? (
        <div className="letter-row">
          {CHORD_LETTERS.map(l => (
            <button key={l} className="letter-opt" onClick={() => setLetter(l)}>{l}</button>
          ))}
          <button className="letter-opt dim" onClick={() => { setLetter(''); setMods([]); }}>sin acorde</button>
        </div>
      ) : (

// ---- Metronome (inline expandable) ----
function Metronome({ tempo, timeSig, open, onToggle }) {
  const [bpm, setBpm] = useState(Math.min(300, Math.max(30, parseInt(tempo, 10) || 96)));
  const [playing, setPlaying] = useState(false);
  const [beat, setBeat] = useState(-1);
  const beats = window.beatsPerBar(timeSig);
  const acRef = useRef(null);
  const counter = useRef(0);
  const audioRefs = useRef({});
  useEffect(() => { setBpm(Math.min(300, Math.max(30, parseInt(tempo, 10) || 96))); }, [tempo]);

  const mcfg = (CFG.metronome || {});
  const click = (accent) => {
    const path = accent ? mcfg.accentSoundPath : mcfg.clickSoundPath;
    if (path) {
      try {
        const key = accent ? 'a' : 'c';
        if (!audioRefs.current[key]) audioRefs.current[key] = new Audio(path);
        const a = audioRefs.current[key];
        a.currentTime = 0; a.play();
        return;
      } catch (e) { /* fall back to beep */ }
    }
    let ac = acRef.current;
    if (!ac) ac = acRef.current = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    const t = ac.currentTime;
    const osc = ac.createOscillator(); const gain = ac.createGain();
    osc.frequency.value = accent ? 1600 : 1050;
    osc.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(accent ? 0.7 : 0.45, t + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    osc.start(t); osc.stop(t + 0.06);
  };

  useEffect(() => {
    if (!playing) { setBeat(-1); return; }
    counter.current = 0;
    const tick = () => { const b = counter.current % beats; click(b === 0); setBeat(b); counter.current++; };
    tick();
    const id = setInterval(tick, 60000 / bpm);
    return () => clearInterval(id);
  }, [playing, bpm, beats]);

  useEffect(() => { if (!open) setPlaying(false); }, [open]);

  const adj = d => setBpm(v => Math.min(300, Math.max(30, v + d)));

  return (
    <div className={'metro-inline no-print-controls' + (open ? ' open' : '')}>
      <button className="meta-btn metro-toggle" onClick={onToggle}>♩ METRÓNOMO {open ? '▴' : '▾'}</button>
      <div className="metro-body">
        <div className="metro-row">
          <button className="metro-play" onClick={() => setPlaying(p => !p)} aria-label={playing ? 'Detener' : 'Reproducir'}>{playing ? '❚❚' : '▶'}</button>
          <div className="metro-bpm">{bpm}<small>BPM</small></div>
          <div className="metro-controls">
            <button className="metro-step" onClick={() => adj(-5)}>«</button>
            <button className="metro-step" onClick={() => adj(-1)}>–</button>
            <button className="metro-step" onClick={() => adj(1)}>+</button>
            <button className="metro-step" onClick={() => adj(5)}>»</button>
          </div>
          <div className="metro-dots">
            {Array.from({ length: beats }).map((_, i) => (
              <span key={i} className={'mdot-wrap' + (i === 0 ? ' first' : '')}>
                <span className={'mdot' + (i === beat ? ' on' : '')} />
              </span>
            ))}
          </div>
          <span className="metro-name">{window.tempoName(bpm)}</span>
        </div>
      </div>
    </div>
  );
}
